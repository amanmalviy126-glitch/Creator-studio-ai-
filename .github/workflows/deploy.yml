name: CI & Android Build Verification

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-verify:
    name: Build & Lint Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Run TypeScript Linter
        run: npm run lint

      - name: Build Application (Vite + Server Bundle)
        run: npm run build

      - name: Verify Build Artifacts
        run: |
          if [ ! -d "dist" ]; then
            echo "Error: dist directory was not generated!"
            exit 1
          fi
          if [ ! -f "dist/server.cjs" ]; then
            echo "Error: dist/server.cjs bundled server is missing!"
            exit 1
          fi
          echo "Build verification completed successfully!"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-dist
          path: dist/
          retention-days: 7

  build-android:
    name: Build Android Debug APK
    runs-on: ubuntu-latest
    needs: build-and-verify

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Build Web Assets
        run: npm run build

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Verify and Restore Gradle Wrapper Jar
        run: |
          if ! unzip -t android/gradle/wrapper/gradle-wrapper.jar >/dev/null 2>&1; then
            echo "Gradle wrapper jar is missing or corrupted. Restoring official gradle-wrapper.jar..."
            curl -sSL -o android/gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.11.1/gradle/wrapper/gradle-wrapper.jar
          else
            echo "Gradle wrapper jar is valid."
          fi

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Make Gradlew Executable
        run: chmod +x android/gradlew

      - name: Build Android Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace

      - name: Upload Android Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
